name: Construir Producción Patrona

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }

      - name: Instalar dependencias
        run: npm install

      - name: Compilar la app (rosa)
        run: npm run build

      - name: Crear proyecto Android
        run: npx cap add android || npx cap sync android

      - name: Sincronizar
        run: npx cap sync android

      - name: Icono de gatita rosa
        run: |
          python3 -m pip install --quiet pillow
          python3 make-icon.py

      - name: Permisos a Gradle
        run: chmod +x android/gradlew

      - name: Construir APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Produccion-Patrona-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
